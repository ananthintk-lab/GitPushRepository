<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            color: #111;
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            max-width: 720px;
        }

        .filter-bar label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #555;
        }

        .filter-select {
            padding: 0.35rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.875rem;
            background: #fff;
            cursor: pointer;
        }

        .task-list {
            display: grid;
            gap: 1rem;
            max-width: 720px;
        }

        .task-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .task-description {
            font-size: 0.875rem;
            color: #666;
        }

        .priority-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .priority-badge.HIGH {
            background: #fee2e2;
            color: #b91c1c;
        }

        .priority-badge.MEDIUM {
            background: #fef9c3;
            color: #a16207;
        }

        .priority-badge.LOW {
            background: #f3f4f6;
            color: #4b5563;
        }

        .empty-state {
            color: #888;
            font-style: italic;
        }

        .priority-select {
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid #ccc;
            cursor: pointer;
            flex-shrink: 0;
            appearance: none;
        }

        .priority-select.HIGH {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }

        .priority-select.MEDIUM {
            background: #fef9c3;
            color: #a16207;
            border-color: #fde047;
        }

        .priority-select.LOW {
            background: #f3f4f6;
            color: #4b5563;
            border-color: #d1d5db;
        }
    </style>
</head>
<body>
    <h1>Tasks</h1>

    <div class="filter-bar">
        <label for="filterSelect">Filter by priority:</label>
        <form method="get" action="/tasks">
            <select id="filterSelect" name="filter" class="filter-select" onchange="this.form.submit()">
                <option value="" th:selected="${filter == null}">All</option>
                <option th:each="p : ${priorities}"
                        th:value="${p.name()}"
                        th:text="${p.name()}"
                        th:selected="${p == filter}">MEDIUM</option>
            </select>
        </form>
    </div>

    <div class="task-list" th:if="${not #lists.isEmpty(tasks)}">
        <div class="task-card" th:each="task : ${tasks}">
            <div class="task-content">
                <div class="task-title" th:text="${task.title}">Task title</div>
                <div class="task-description" th:text="${task.description}" th:if="${task.description != null}">Description</div>
            </div>
            <form th:action="@{/tasks/{id}/priority(id=${task.id})}" method="post">
                <input type="hidden" name="filter" th:if="${filter != null}" th:value="${filter.name()}">
                <select name="priority"
                        class="priority-select"
                        th:classappend="${task.priority.name()}"
                        onchange="this.form.submit()">
                    <option th:each="p : ${priorities}"
                            th:value="${p.name()}"
                            th:text="${p.name()}"
                            th:selected="${p == task.priority}">MEDIUM</option>
                </select>
            </form>
        </div>
    </div>

    <p class="empty-state" th:if="${#lists.isEmpty(tasks)}">
        <span th:if="${filter != null}">No tasks match the selected priority filter.</span>
        <span th:if="${filter == null}">No tasks found.</span>
    </p>
</body>
</html>
